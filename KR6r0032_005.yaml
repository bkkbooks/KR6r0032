body:
  text: 梁扶南三藏僧伽婆羅譯半菴摩勒施僧因緣品第五爾時阿育王得堅固信問諸比丘誰已能於佛法之中最大布施諸比丘答言孤獨長者已大布施王復問言其能幾許佛法中施比丘答言用百千萬金阿育王聞即便思惟孤獨長者用百千萬金我於今者亦以百千萬金以用布施阿育大王已起八萬四千塔又於初生得道轉法輪入涅槃及諸羅漢涅槃之處各以十萬金施四部大會亦已作訖又三十萬衆僧一分阿羅漢二分學人及精進凡夫於一日中一時施食又阿育王唯留珍寶一切大地宮人大臣鳩那羅及以自身悉施衆僧復以四十萬金布施衆僧又以無數之金贖此大地乃至自身後以九十六千萬金布施衆僧時阿育王得病困篤生大憂惱大臣成護是其先世隨喜施沙知識聞大王病便往王所而禮王足即説偈言昔面如蓮花塵垢不能污大力諸怨家不得見大王猶如日炎盛人所不能視何故於今者悲泣而流淚阿育王以偈答言我今生憂惱不為身命財別離聖衆故是以我憂惱世尊諸弟子成就諸功德以種種飲食日日常供養當思惟此事是故我流淚復次成護我昔欲以百千萬金供養三寶而意未滿我今欲以四十千萬金布施滿我本心思惟已便欲遣四十千萬金送與雞寺是時鳩那羅兒名三波地翻具足為太子大臣語太子言阿育大王須臾應終而今欲遣四十千萬金送與雞寺一切國王以物為力太子應當勒守物人勿令金出於是太子即便勒之阿育王敕不復施行唯有金器供王食用王食訖已便令送此金器與彼雞寺復斷金器聽以銀器王食竟已復令送此銀器與彼雞寺復斷銀器乃至以鐵器供王王食已復令送與雞寺復斷鐵器聽用瓦器時阿育王無復有物唯半菴羅果在其手中時阿育王心大悲惱召諸大臣及以人民一切和合而語之言誰於今日為此地主大臣起而作禮合掌説言唯天為主更無異人時阿育王淚落如雨而説偈言今我阿育王無復自在力唯半阿摩勒於我得自在何用是富貴如恆河流水先所領國土豪富最第一今忽貧窮至不復得自在一切諸合會皆悉當分離如來正法言無有能知者我先所敕令一切無障罣猶如心意識於緣得自在我今所教敕如水礙於石一切諸怨賊我先悉降伏王領一切地攝一切貧苦今者無光明如雲障於月如阿輸迦樹花葉悉枯落是我阿輸迦貧悴亦如是是時阿育王即呼傍臣名曰跋陀羅目阿翻賢面而語之言我失自在汝今於我為最後使唯此一事汝應當作此半阿摩勒果送與雞寺宣我語曰阿育王禮衆僧足昔領一切閻浮提地今者唯有半阿摩勒果是我最後所行布施願僧受之此物雖小以施衆僧福德廣大而説偈言我本為人王於宮得自在無常為自相不久而磨滅能為療治者唯有聖福田今我無醫藥願今見濟度此半阿摩勒是我最後施小施而福廣是故應攝受時此使人受王敕已將半阿摩勒果往至雞寺於上座前以阿摩勒果供養衆僧合掌説偈一切地一繖王領無障礙猶如日光明遍照一切處以自欺誑業功德於今盡譬如日入時無復有光明以恭敬頂禮施半阿摩勒顯其福德盡今為最後施是時上座集諸比丘而語之言汝等今當起怖畏心如佛所説見他無常是處可畏誰能於此不生厭離何以故勇猛能布施孔雀阿育王王領於大地閻浮提自在今日果報盡唯有阿摩勒大地諸珍寶悉為他所護今此阿育王捨半阿摩勒諸有凡夫人福德力生慢當為説無常令其生厭離時諸衆僧得阿育王半阿摩羅果碎以為末以置羹中遍行衆僧時阿育王語成護言誰今為王成護禮足合掌説言天為地主更無有人時阿育王以人扶起遍觀四方向衆僧處合掌而言今留珍寶此外大地乃至大海一切施僧又説偈言水為大地衣七寶嚴地面持一切衆生及以諸山等我今以捨此布施諸衆僧於衆僧得果是故我今施以此布施福不求帝釋處亦不樂梵天及諸大地主唯欲以此福願求心自在得共聖人法人所不能奪乃至阿育王以多羅葉書此偈語以齒印之執書合掌向彼僧處而作是言以此大地一切施僧説己便終乃至大臣用五色綵以莊嚴輿供養王身供養已便水欲以灌太子頂以授王位成護語諸臣言一切大地阿育大王已施衆僧諸臣答言我等今者當作云何成護答言先阿育王作意我用百千萬金施佛法僧已與九十六千萬金欲更滿之而諸臣不聽王意不滿故以一切大地布施衆僧諸臣即便取四十千萬金以贖大地即以海水灌太子三波地頂令登王位三波地兒名毗梨訶鉢底翻太白星太白有兒名毗梨沙斯那翻牛畢牛畢有兒名弗沙跋摩翻尾鎧星尾鎧有兒名弗沙蜜多羅翻差友乃至弗沙蜜多羅得登王位集諸大臣以何方便能令我名恆住不失諸臣答言大王之姓從阿育王來是阿育王起八萬四千塔乃至佛法未滅阿育大王名聞亦在王今應當起八萬四千塔時王答言阿育大王有大神力人無及者更有方便得流名不是時有婆羅門呪願第一而是凡夫不信佛法白王言有二種因名得常住一者作惡二者作善阿育大王起八萬四千塔天今壞之名則常在乃至弗沙蜜多羅王嚴駕四兵欲壞佛法往至雞寺至已於寺門聞有師子吼王大怖畏復還波吒利弗國如是三反往至雞寺亦復如是還於本國集彼衆僧而作是言我於今者欲壞佛法諸衆僧中於塔及寺各有所護宜各説之諸僧皆言我等護塔王於是時即殺上座次及諸僧時有沙柯羅國是其所領語彼國人若有能得一比丘首與其金錢彼國有寺名曰法王時彼寺中有一羅漢人欲取頭而白王言彼有比丘今欲取頭送與大王時王聞已自欲取之是時比丘入滅盡定以定力故刀杖火毒不能侵害既不得殺復往餘處至拘瑟他歌翻庫藏國彼國有一夜叉神守護佛牙是夜叉思惟佛法當滅我既受戒不復殺生我有女兒已利履亡失反夜叉本欲求之以其先常作惡業故而我不許為護佛法今應與之復有一大力夜叉常護弗沙蜜多羅王以其力故人無侵害是護佛牙神將護王夜叉至於南海是時已利履夜叉取太山壓弗沙蜜多羅王及其四兵一時皆死是故此山名修尼喜多弗沙蜜多羅王既被殺已孔雀大姓從此而滅
