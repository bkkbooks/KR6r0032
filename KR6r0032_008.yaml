body:
  text: 梁扶南三藏僧伽婆羅譯佛弟子五人傳授法藏因緣下優波笈多因緣爾時舍那婆私於大醍醐山起寺已即便思惟賣香商主名笈多生已未生見其已生其兒名優波笈多世尊所記無相佛我入涅槃百年後能作佛事生已未生見其未生舍那婆私以方便力教化賣香商主令其精進時舍那婆私一日多將弟子入其家別日與一弟子入其家復於一日獨入其家笈多當作佛事見舍那婆私獨來其家問言聖人何故獨無弟子隨從長老語言我是老人何得有人隨從於我若有人樂精進出家則有隨從笈多語言我樂在家受五欲樂不能出家若我生兒當隨長老長老言如是如是恆作此願勿令退失乃至笈多生兒名阿波笈多翻不正護至其長大舍那婆私往至笈多所語言汝先有願若我生兒當與長老今兒已生此兒有德汝當聽其隨我出家笈多言我今唯有一兒若第二兒生當與長老時舍那婆私思惟此兒是優波笈多不見其非是語笈多言如是乃至第二兒生名陀那笈多翻寶護至其長大舍那婆私往笈多處語言汝先願第二兒生當與我今兒已生汝當聽其隨我出家笈多答言長老勿瞋我有二兒共治家業一令覓物一令守護若第三兒生當與長老舍那婆私復更思惟此是優波笈多不見其非是語笈多言如是乃至第三兒生端正好色甚可愛樂過人之色不及天色是故名為優波笈多是兒長大其父留之以法治生多獲其利時舍那婆私往笈多處語言善男子汝先願第三兒生當以與我今兒已生汝當聽其隨我出家笈多答言我當作誓令其治生若長若退不得出家不長不退乃聽出家是時魔王令摩偷羅國一切人衆悉買其物令其得利乃至舍那婆私往笈多所時優波笈多正在賣香長老語言汝心心法生云何為善云何為惡優波笈多答言我今不知心心法云何為善云何為惡長老語言若心心法與貪嗔癡相應是名為惡與不貪不瞋不癡相應是名為善乃至長老復於異時更往優波笈多所語言善男子汝云何心心法生為善為惡答言我今不知心心法云何為善云何為惡長老言汝今欲知心心法為善惡者若能受道除心心法惡我當作事時長老以黑白土為丸而語之言若汝黑心起取黑丸若白心起取白丸當作不淨觀如所説念佛應當思惟是時優波笈多欲善作心心法而取多黑丸乃至不得一白丸復更思惟取二分黑丸一分白丸復更思惟取半黑丸半白丸復更思惟取二分白丸一分黑丸復更思惟乃至一切白心起悉取白丸是時摩偷羅國有淫女名婆娑婆達多翻天主與其有一婢往優波笈多處買香多得香還其主問言汝於何處得此多香將不於估客偷此香來婢答言有估客名優波笈多形色具足言語微妙以法賣物其主聞已於優波笈多起淫欲心復令其婢至優波笈多處汝當語彼云我欲與汝共相娛樂乃至其婢白優波笈多優波笈多言汝可答彼我今相見未是其時婢還白其主其主云彼不能以五百銀錢與我是故不來復令婢往而語之言我不須錢但須汝來共相娛樂其婢復往優波笈多所説其此言優波笈多猶答言我今相見未是其時乃至別有長者子往婆娑婆達多所復有一商主從北天竺來將五百匹馬及種種物至摩偷羅國至已問摩偷羅國人此國何處有第一端正女人國人答言有女人第一端正名婆娑婆達多商主又言我今欲以五百銀錢及種種寶物往至其處是時淫女貪其物故殺長者子取其身骸置不淨處與後商主共相娛樂是長者子親善知識於不淨處覓得身骸往白國王國王語言汝可取彼婆娑婆達多截其手腳及以耳鼻散置野外乃至如王教令截其手腳散置野外是時優波笈多聞婆娑婆達多手腳被截散在野外即便思惟我於本時不樂見之共受五欲今時欲見觀其手腳及其耳鼻復説偈曰昔以最勝衣及種種寶飾如是等衆具莊嚴於其身若人樂解脫欲厭離於世是時不當見寶飾莊嚴身今時應往觀無慢無歡喜其色還本相視之生厭離爾時優波笈多將一小兒捉繖隨從行至野外是時其婢憶念其恩住其身邊驅逐烏鳥不令侵啄乃至其婢語之先數遣喚優波笈多其人今來起欲心耶其主聞之即便説言我好形容今已毀壞實為大苦於此地上為血所污舉身皆赤我身如是云何見之而起欲心語其婢言我手腳耳鼻集之一處無令得見乃至其婢集在一處以衣覆之是時優波笈多至已對婆娑婆達多立而觀之婆娑婆達多見優波笈多語言聖善至昔時我身堪受五欲于時遣使而言非時今手腳被截在血泥何故而來復説偈言前時之身猶如蓮花大價寶衣以為莊嚴而無功德故不見汝我今如此汝何故來即身離莊嚴離歡喜血為塗香見之驚惋優波笈多答言我今非是起欲心來為見貪欲想及不淨想是故我來復説偈曰以諸寶衣及種種花莊嚴汝身見者心亂一切衆人有欲見者以無物故而不得見今汝此身散在諸處一切衆人無不見者色還本相離於莊嚴臭處如是尸骸共住身薄皮覆以血灌之薄皮覆之以肉泥之千脈纏縛處處周遍此身如是云何起愛復説姊妹外可愛色世間人見起於欲心若知其內即得解脫貴賤尊卑皆有臭尸愚者見之起於淨見智者見之起不淨見此身臭穢是不淨處以種種香用以熏身此身可惡垢膩膿血種種衣服以自莊嚴身不淨篋以水淨之愚夫罪人愛著此身若有人聞佛説善法隨從受持厭離五欲樂解脫心入寂靜林依道為筏渡有彼岸婆娑婆達多聞其言深畏生死聞佛功德變其意樂於涅槃即便説偈答優波笈多如是如是如汝所説汝實智慧有大慈悲今當更説如來妙法乃至優波笈多次第説法所謂四諦優波笈多更觀其身觀其身竟得厭欲界以自説法故通達四諦得那含果婆娑婆達多得須陀洹果是時婆娑婆達多語優波笈多言善哉善哉摩訶薩埵以汝力故覆三惡道大苦惱處開發天堂涅槃之道復次如來應等正覺及以法僧我今歸依復説偈言我往歸依佛兩足第一尊佛眼若青蓮天人中可貴清淨離欲法無上應真僧乃至優波笈多以説法故令其歡喜還歸本處去已未久婆娑婆達多即便命終生於天上是時諸天為摩偷羅國人説其生天諸人聞已供養其身是時長老舍那婆私往笈多所語言汝當聽優波笈多隨我出家笈多答言我先有約令其治生不利不鋭乃聽出家乃至長老舍那婆私以神通力令其治生不利不鋭是時優波笈多即自思惟稱量算計不利不鋭舍那婆私更至笈多所而語言汝此兒是佛所記我入涅槃百年後當作佛事汝當聽其隨我出家乃至笈多聽其出家是時長老舍那婆私將優波笈多往那哆婆哆寺與其出家受具足戒至第四羯磨除一切結得阿羅漢果是時舍那婆私語優波笈多言善男子如佛所記我入涅槃百年後有比丘名優波笈多無相佛當作佛事如是再説佛弟子中教化第一善男子汝當作佛法饒益優波笈多答言如是舍那婆私教其説法摩偷羅國一切人民聞有比丘名優波笈多無相佛當説法無量千人皆欲往聽乃至長老優波笈多入三昧思惟見佛説法處四衆圍繞如半月形復更思惟世尊説法次第云何即見次第謂欲味欲過欲出及四信等如是次第乃至涅槃優波笈多亦如是説法是時魔王於大衆中雨於真珠以亂人心衆人亂故無有一人能見四諦優波笈多見衆心亂即自念言誰作此事以亂衆心即見知是魔王所作至第二日倍多人來優波笈多更次第説四諦真法是時魔王復更雨金以亂衆心無有一人能見四諦優波笈多見衆心亂即自念言誰作此事以亂衆心即見知是魔王所作至第三日復倍多人來優波笈多復更説法是時魔王更雜雨珠金及作天伎樂是時衆人未得離欲見色聞聲其心變動不復聽法是時魔王即以花鬘繫優波笈多項乃至優波笈多思惟誰作此事即知是魔王所作優波笈多生意此魔王於世尊法藏常作亂事何故世尊不教化之即自思惟是我可化佛記於我為無相佛教化人攝受故乃至思惟今欲化之是其時不即見魔王受化時至是時長老優波笈多取三死尸一者死蛇二者死狗三者死人以神通力變三死尸以作花鬘往魔王處魔王見優波笈多生大歡喜優波笈多已受我化即便以身欲受花鬘優波笈多自手縛之即以死蛇繫其頂上死狗死人繫其頸下優波笈多語魔王言如汝先以非法之花以辱於我如是我今還以死尸繫縛於汝汝今已與佛子和合若有神力可以現我譬如大風能動海水以為波浪而不能動摩羅耶山翻離垢山是時魔王欲脫死尸用力極多而不能脫譬如蚋子不能移山魔王瞋忿上升虛空而説偈言若我自不能從頸脫死尸有餘天能脫其力則大我長老優波笈多復以偈言汝往歸依梵及日月帝釋入火及大海不燥爛不脫我以此死尸繫著於汝頸神力之所作無有能脫者爾時魔王往摩醯首羅及帝釋等三十三天四天王為脫死尸而不得脫復往大梵天處大梵語言善男子十力弟子神力所作誰能脫之如大海岸水不能破復説偈曰如蓮花絲縛於雪山有能稱舉此不為難神通之力死尸繫身我今不能為汝脫之若我諸天所有之力不及如來弟子之力譬如餘光不及火光如此火光不及日光魔王語言云何教我所作我於今者當歸依誰大梵語言汝今速往歸依優波笈多如人於此地墮即於是地得起汝今從其神力墮還從其神力起是時魔王方知佛子神力為大即便思惟復説偈言若梵王歸依佛弟子法藏誰復能思量如來之神力如來之神力實能降伏我但以慈悲故是故不降伏我今已知佛力不復廣説復説偈言今我已知世尊慈悲心離煩惱譬如金山我無明故處處亂佛處處作惡而不降伏爾時欲界主魔王無逃避處離優波笈多而思惟即捨慢心往優波笈多處禮其足説言長老我從菩提樹間乃至今日於世尊所起種種惡無量無數復於娑羅國婆羅門舍佛往彼處令不得食是我所作我所作惡佛亦不嗔我或時化作龍蛇惡鬼種種可畏以怖世尊亦不嗔我長老今日無有慈悲令一切世間天人阿修羅皆見怪笑令我羞愧優波笈多言汝無智慧不能思惟欲以如來慈悲功德比於比丘譬如芥子比須彌山無異螢火等彼日光取一掬水同於大海如是沙門慈悲不得比十力慈悲佛以是因緣汝所作罪佛忍受之魔王言佛斷一切惑除一切疑有大忍辱我以煩惱惡故常欲惱佛世尊以慈悲覆護於我以是故佛不伏我長老當説優波笈多答言善男子汝今當聽汝於佛多作衆惡種不善法除於如來生信敬心無以除滅是故佛見當來久遠不伏於汝復説偈言汝心少敬重如來則發起從小增長大當得涅槃果汝所作衆罪今但略説之當以念慧水洗除煩惱垢爾時魔王念佛舉身毛竪如歌曇婆花不解翻復説偈言我多種種苦惱世尊世尊不瞋我願相應如兒罪過父不責之爾時魔王多時思惟佛恩以念佛故令其心冷禮長老之足而説偈言長老今日已攝受我能令於我恭敬世尊今以死尸繫縛我頸以為莊嚴唯願大仙以慈悲力為我脫之長老優波笈多言若能有約當為脫之魔王問言云何為約優波笈多言汝從今去莫惱比丘魔王答言如是如是復當云何教我所作長老答言世尊法藏當廣流布是我所作是時魔王驚而復説教我所作長老答言汝今當知如來入涅槃百年後我時出家世尊法身我已得見世尊色身我所未見汝今為我所攝受故如來色身汝當現我我於今者更無所樂唯樂見佛身魔王偈答當共作約若見我作如來身色不得見禮此是一切智恭敬故長老禮我我當自滅令無有力擔聖人禮如伊蘭芽不能勝持象牙所擔故先共約長老優波笈多答言如是我不禮汝魔王復言小待須臾乃至我入林中猶如往昔有一長者名曰首羅我於爾時欲亂彼故化作佛身金色晃曜圓光一尋猶如日光如是色身不可思議我今故作令人見者悉生信樂是時長老優波笈多答言如是即便為除三種死尸為欲見於如來色身故是時魔王即入林中化作佛身作佛身竟從林而出譬如女人入屏帳裏種種莊嚴莊嚴既竟然後乃出如來色相無有譬喻令人見者無不歡喜譬如采畫有種種色爾時魔王以變化色莊嚴林竟又復作舍利弗以置右邊作目揵連以置左邊復作阿難持鉢在後摩訶迦葉阿䨲樓馱須菩提等一千二百五十諸大聲聞圍繞化佛如半月形作是化已往至優波笈多所優波笈多見佛身色生歡喜心即從坐起觀佛色身目不暫捨即説偈言無常無慈悲破壞如來色如來無常故滅色入涅槃優波笈多緣念佛故心不能捨我今見此化身見真佛無異一心合掌略以偈讚面勝於蓮花眼勝優波羅色勝衆花林亦勝於真金可愛過於月光明過於日智深過於海不動過須彌行勝師子王眼瞬勝牛王復次歡喜滿心大聲而説偈言以心清淨業今得此妙果以自業所造不由他所作無量無數劫修淨身口業具足行六度莊嚴不障身見者皆歡喜怨家亦生愛我今見如來云何不歡喜是時優波笈多思惟念佛故不覺是魔以一切身禮魔王足譬如大樹根折躄地爾時魔王驚而説言長老今者不應乖約長老答言云何為約魔王言先共作約若我作佛不應作禮云何於今而見禮耶長老從地起小聲答言我非不知如來涅槃如水滅火但見如來其色微妙是故作禮不禮汝也魔王問言汝一切身分頂禮我足云何而言不禮我耶優波笈多言我不禮汝亦不乖約汝今當聽譬如以土為佛若禮敬者但作佛想不作土想我今見汝但作佛想不作魔想爾時魔王即捨佛形供養優波笈多還歸本處剋後四日魔王即自打鐘令一切人悉皆聞知若欲生天及得涅槃皆應往優波笈多所咨受正法若有人未見佛者當往觀優波笈多於是魔王説偈言若人欲富貴不樂於貧窮若樂天上樂及大涅槃樂悉當聽受法思惟其義趣若人未曾見最勝兩足尊大師有慈悲自然得聖法悉皆應當往優波笈多所此人為世間而作於明燈爾時此聲遍滿摩偷羅國優波笈多降伏魔王已摩偷羅國諸婆羅門等一切人民皆往優波笈多所時優波笈多坐師子座為衆説法心無所畏猶如師子即説偈言若人無有智不登師子座如苟登高座深生大怖畏如師子無畏摧伏外道論若能如是者堪登師子座是時優波笈多初所説法已次第説所謂四諦是時無數人有得阿那含果斯陀含果須陀洹果乃至一萬八千人出家思惟坐禪精進修道得阿羅漢果於大醍醐山有石窟長十八肘廣十二肘是時諸弟子已作所作竟長老優波笈多語諸弟子諸弟子中我已教化證阿羅漢果得阿羅漢者取四寸籌置石窟中乃至一日中有萬八千阿羅漢取籌置石窟中是時乃至海邊大地廣聞名聲知摩偷羅國有優波笈多教化第一佛之所記舍那婆私得道因緣爾時舍那婆私與優波笈多出家竟優波笈多教化降伏魔王已為攝受衆生故舍那婆私思惟攝受正法已竟我今欲向罽賓國受三昧樂世尊所記罽賓國是第一坐禪處是時舍那婆私即往彼處入於石窟受三昧樂有清淨涼風以吹其身即得阿羅漢果受解脫樂而説偈言著舍那婆衣觸五種三昧於最勝山中端坐入禪定令風中出聲遍告罽賓國是舍那婆私今已得道樂以清淨自誓得無漏解脫今舍那婆私自説如是偈
